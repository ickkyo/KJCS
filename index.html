<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>11th room</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    background:#f5f0e6;

    background-image:
      linear-gradient(rgba(0,0,0,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,.03) 1px, transparent 1px);

    background-size:40px 40px;
}

.card{
    width:90%;
    max-width:420px;

    background:rgba(255,255,255,.92);

    border-radius:20px;

    padding:35px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
    color:#355c45;
    margin-bottom:30px;
    font-size:2.2rem;
}

input{
    width:100%;
    box-sizing:border-box;

    padding:14px;

    border-radius:12px;

    border:1px solid #ccc;

    font-size:16px;
}

button{
    margin-top:15px;

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#355c45;

    color:white;

    font-size:16px;

    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#error{
    color:red;
    margin-top:15px;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#777;
}

</style>

</head>

<body>

<div class="card">

<h1>11th room</h1>

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">
Enter
</button>

<p id="error"></p>

<div class="footer">
Class Portal
</div>

</div>

<script>

function login(){

const password =
document.getElementById("password").value;

if(password==="141"){

sessionStorage.setItem(
"roomAccess",
"true"
);

location.href="room.html";

}else{

document.getElementById(
"error"
).textContent =
"Password is incorrect";

}

}

</script>

</body>
</html>
